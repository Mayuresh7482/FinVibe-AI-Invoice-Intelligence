{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Login • FinVibe AI</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
   <link href="{% static 'invoices/css/dashboard.css' %}" rel="stylesheet">
   <style>
      .login-wrapper {
         min-height: 100vh;
         display: flex;
         align-items: center;
         justify-content: center;
         background: var(--fv-bg);
      }

      .login-card {
         background: var(--fv-surface);
         border: 1px solid var(--fv-border);
         border-radius: var(--fv-radius);
         padding: 2.5rem;
         width: 100%;
         max-width: 420px;
         backdrop-filter: blur(20px);
         -webkit-backdrop-filter: blur(20px);
         box-shadow: var(--fv-shadow);
         animation: fadeInUp 0.5s ease forwards;
      }

      .login-brand {
         display: flex;
         align-items: center;
         justify-content: center;
         gap: 0.75rem;
         margin-bottom: 2rem;
      }

      .login-brand .brand-icon {
         width: 48px;
         height: 48px;
         font-size: 1.3rem;
      }

      .login-brand .brand-text {
         font-size: 1.8rem;
      }

      .login-subtitle {
         text-align: center;
         color: var(--fv-text-muted);
         font-size: 0.9rem;
         margin-bottom: 1.5rem;
      }

      .btn-login {
         background: var(--fv-gradient-1) !important;
         border: none;
         font-weight: 600;
         padding: 0.6rem;
         font-size: 1rem;
         border-radius: var(--fv-radius-sm);
         transition: var(--fv-transition);
         width: 100%;
      }

      .btn-login:hover {
         transform: translateY(-2px);
         box-shadow: 0 6px 20px rgba(45, 212, 191, 0.35);
      }
   </style>
</head>

<body>
   <div class="login-wrapper">
      <div class="login-card">
         <!-- Brand -->
         <div class="login-brand">
            <div class="brand-icon">
               <i class="bi bi-lightning-charge-fill"></i>
            </div>
            <span class="brand-text">FinVibe</span>
            <span class="badge bg-primary-subtle text-primary-emphasis rounded-pill"
               style="font-size: 0.7rem;">AI</span>
         </div>

         <p class="login-subtitle">
            Sign in to your AI Invoice Intelligence dashboard
         </p>

         <!-- Error Messages -->
         {% if form.errors %}
         <div class="alert alert-danger py-2 d-flex align-items-center" role="alert">
            <i class="bi bi-shield-exclamation me-2"></i>
            <small>Invalid username or password. Please try again.</small>
         </div>
         {% endif %}

         <!-- Login Form -->
         <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <div class="mb-3">
               <label for="id_username" class="form-label small fw-semibold text-muted">
                  <i class="bi bi-person me-1"></i> Username
               </label>
               <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter username"
                  autofocus required>
            </div>

            <div class="mb-4">
               <label for="id_password" class="form-label small fw-semibold text-muted">
                  <i class="bi bi-lock me-1"></i> Password
               </label>
               <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter password"
                  required>
            </div>

            <button type="submit" class="btn btn-login text-white">
               <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
         </form>

         <div class="text-center mt-3">
            <small class="text-muted">
               <i class="bi bi-shield-check me-1"></i>
               Secured with session encryption
            </small>
         </div>
      </div>
   </div>
</body>

</html>
